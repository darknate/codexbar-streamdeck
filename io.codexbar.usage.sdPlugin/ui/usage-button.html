<!doctype html>
<html>
  <head lang="en">
    <meta charset="utf-8" />
    <script src="sdpi-components.js"></script>
  </head>
  <body>
    <sdpi-item label="Provider">
      <sdpi-select setting="provider">
        <option value="codex">Codex</option>
        <option value="claude">Claude</option>
        <option value="cursor">Cursor</option>
      </sdpi-select>
    </sdpi-item>

    <sdpi-item label="Snapshot Path">
      <sdpi-textfield
        setting="snapshotPath"
        placeholder="~/Library/Group Containers/group.com.steipete.codexbar/widget-snapshot.json"
      ></sdpi-textfield>
    </sdpi-item>

    <sdpi-item label="Refresh Sec">
      <sdpi-range
        setting="refreshIntervalSec"
        min="2"
        max="60"
        step="1"
        showlabels
        showvalue
      ></sdpi-range>
    </sdpi-item>

    <sdpi-item label="Stale Sec">
      <sdpi-range
        setting="staleThresholdSec"
        min="30"
        max="3600"
        step="30"
        showlabels
        showvalue
      ></sdpi-range>
    </sdpi-item>
  </body>
</html>
